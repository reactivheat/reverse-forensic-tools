name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff check
        run: ruff check src/

  test:
    name: Tests & CLI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libmagic
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install test deps
        run: |
          pip install pefile rich click pyyaml python-magic pytest

      - name: Run pytest (best-effort)
        run: pytest src/tests/ -v --tb=short || true

      - name: Verify CLI --help
        run: rft --help

      - name: Verify CLI version
        run: rft version

  security-scan:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: python -m pip install --upgrade pip bandit

      - name: Bandit scan
        run: bandit -r src/ -q --skip B101,B110,B112
